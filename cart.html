<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="./img/favicon.ico" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Your Cart — Cocoa Luxe</title>
  </head>
  <body class="font-[Inter] bg-[#FAF7F2] text-[#2D1810] min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#8D4201] backdrop-blur-md shadow-lg">
      <div class="max-w-7xl m-auto flex items-center justify-between px-4 sm:px-6 py-3">
        <a href="./index.html" class="flex-none w-16 sm:w-20">
          <img src="./img/logo.png" alt="Cocoa Luxe Logo" class="w-full" />
        </a>
        <nav class="hidden md:flex gap-8 text-white font-medium text-sm tracking-wide">
          <a href="./index.html" class="hover:text-amber-200 transition">Home</a>
          <a href="./index.html#products" class="hover:text-amber-200 transition">Products</a>
          <a href="./index.html#about" class="hover:text-amber-200 transition">About</a>
          <a href="./index.html#contact" class="hover:text-amber-200 transition">Contact</a>
        </nav>
        <div class="flex items-center gap-4">
          <a href="./cart.html" id="cartello" class="relative cursor-pointer text-white hover:text-amber-200 transition">
            <span class="absolute -top-2 -right-2 bg-white text-[#8D4201] w-5 h-5 rounded-full flex justify-center items-center text-[10px] font-bold shadow">0</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256">
              <path d="M233.21,56.31A12,12,0,0,0,224,52H66L60.53,21.85A12,12,0,0,0,48.73,12H24a12,12,0,0,0,0,24H38.71L63.62,173a28,28,0,0,0,4.07,10.21A32,32,0,1,0,123,196h34a32,32,0,1,0,31-24H91.17a4,4,0,0,1-3.93-3.28L84.92,156H196.1a28,28,0,0,0,27.55-23l12.16-66.86A12,12,0,0,0,233.21,56.31ZM100,204a8,8,0,1,1-8-8A8,8,0,0,1,100,204Zm88,8a8,8,0,1,1,8-8A8,8,0,0,1,188,212Zm12-83.28A4,4,0,0,1,196.1,132H80.56L70.38,76H209.62Z"></path>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <!-- Cart Content -->
    <main class="flex-1 max-w-5xl w-full mx-auto px-4 sm:px-6 py-10">
      <h1 class="font-[Playfair_Display] text-3xl sm:text-4xl font-bold mb-8">Your Cart</h1>

      <!-- Empty State -->
      <div id="cart-empty" class="hidden text-center py-20">
        <p class="text-5xl mb-4">🛒</p>
        <p class="text-gray-500 text-lg mb-6">Your cart is empty</p>
        <a href="./index.html" class="inline-block bg-[#8D4201] hover:bg-[#6A3201] text-white px-8 py-3 rounded-full font-semibold text-sm transition">Continue Shopping</a>
      </div>

      <!-- Cart Items -->
      <div id="cart-items" class="space-y-4"></div>

      <!-- Cart Summary -->
      <div id="cart-summary" class="hidden mt-10 bg-white rounded-2xl shadow-md p-6 sm:p-8">
        <div class="flex justify-between items-center mb-3 text-sm text-gray-500">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="flex justify-between items-center mb-3 text-sm text-gray-500">
          <span>Shipping</span>
          <span id="shipping">Free</span>
        </div>
        <hr class="my-4 border-gray-200" />
        <div class="flex justify-between items-center text-lg font-bold text-[#2D1810]">
          <span>Total</span>
          <span id="total">$0.00</span>
        </div>
        <a href="./checkout.html" id="checkout-btn" class="block text-center mt-6 bg-[#8D4201] hover:bg-[#6A3201] text-white py-3.5 rounded-full font-semibold text-sm tracking-wide transition-all duration-300 shadow-lg hover:shadow-xl hover:-translate-y-0.5">
          Proceed to Checkout
        </a>
        <a href="./index.html" class="block text-center mt-3 text-[#8D4201] hover:underline text-sm font-medium">
          ← Continue Shopping
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#1a0e08] text-white/70">
      <div class="border-t border-white/10 text-center py-5 text-xs text-white/40">
        © 2026 Cocoa Luxe. All rights reserved.
      </div>
    </footer>

    <script src="./js/cart.js"></script>
  </body>
</html>
